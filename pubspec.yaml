name: dateapp
description: Telugu Panchangam-based Nakshatram & Tithi Calculator
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management (lightweight)
  hooks_riverpod: ^2.5.1

  # For simple local search/autocomplete
  http: ^1.2.0
  google_sign_in: ^6.2.1
  permission_handler: ^11.3.1
  device_calendar: ^4.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^2.32.0
  firebase_auth: ^4.17.8
  timezone: ^0.9.4
  table_calendar: ^3.2.0
  intl: ^0.20.2
  connectivity_plus: ^6.0.5
  geolocator: ^12.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/cities.json
